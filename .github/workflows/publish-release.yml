name: Publish Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run mode (skips publish, release creation, and push)'
        required: false
        type: boolean
        default: false

jobs:
  publish-release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      packageUser: ${{ github.actor }}
      packagePAT: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_DEFAULT_PLATFORM: linux/amd64
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
      
      - name: Calculate versions
        id: versions
        run: |
          # Read current version from gradle.properties
          CURRENT_VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          echo "Current version: $CURRENT_VERSION"

          # Remove -SNAPSHOT suffix if present
          BASE_VERSION=$(echo "$CURRENT_VERSION" | sed 's/-SNAPSHOT//')
          RELEASE_VERSION="$BASE_VERSION"

          # Parse version components for next dev version
          MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
          PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)

          # Calculate next development version (patch bump)
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"

          echo "Release version: $RELEASE_VERSION"
          echo "Next version: $NEXT_VERSION"

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
      
      - name: Set up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.0
        with:
          version: 2201.13.2
      
      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Validate release version
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$RELEASE_VERSION already exists on remote"
            exit 1
          fi
          if ! echo "$RELEASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format. Expected format: X.Y.Z (e.g., 1.0.0)"
            exit 1
          fi
      
      - name: Dry Run Mode Notice
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: |
          echo "::notice::Running in DRY RUN mode - no packages will be published, no releases created, and no changes will be pushed"
      
      - name: Update version to release version
        run: |
          # Remove -SNAPSHOT from all version references for release
          sed -i "s/version=.*-SNAPSHOT/version=$RELEASE_VERSION/" gradle.properties
          sed -i "s/version = \".*-SNAPSHOT\"/version = \"$RELEASE_VERSION\"/" ballerina/Ballerina.toml
          sed -i "s/icp.runtime.bridge-native-.*-SNAPSHOT.jar/icp.runtime.bridge-native-$RELEASE_VERSION.jar/" ballerina/Ballerina.toml
          git add gradle.properties ballerina/Ballerina.toml
          if ! git diff --cached --quiet; then
            git commit -m "[Release] Release version $RELEASE_VERSION"
          else
            echo "::notice::No changes to commit for release version"
          fi
      
      # Skip pushing - will create PR at the end with all changes
      
      - name: Build (Dry Run)
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: ./gradlew clean build --stacktrace --no-daemon
      
      - name: Create and push release branch
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          RELEASE_BRANCH="release/v${RELEASE_VERSION}"
          git checkout -b "$RELEASE_BRANCH"
          git push -u origin "$RELEASE_BRANCH"
      
      - name: Build artifacts
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: ./gradlew clean build --stacktrace --no-daemon
      
      - name: Publish to Ballerina Central
        if: ${{ github.event.inputs.dry-run != 'true' }}
        env:
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_ACCESS_TOKEN }}
        run: |
          # Clean target directory to avoid permission issues
          sudo rm -rf ballerina/target || true
          
          cd ballerina
          
          # Pack the module
          bal pack
          
          # Push to Ballerina Central
          bal push
      
      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry-run != 'true' }}
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          target_commitish: release/v${{ env.RELEASE_VERSION }}
          name: Release v${{ env.RELEASE_VERSION }}
          body: |
            Release of icp-runtime-bridge version ${{ env.RELEASE_VERSION }}
            
            **Package Details:**
            - Organization: wso2
            - Package: icp.runtime.bridge
            - Version: ${{ env.RELEASE_VERSION }}
          files: |
            ballerina/build/distributions/*.zip
            ballerina/build/libs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update version to next development version
        run: |
          # Update all version references to next SNAPSHOT version
          sed -i "s/version=.*/version=$NEXT_VERSION/" gradle.properties
          sed -i "s/version = \".*/version = \"$NEXT_VERSION\"/" ballerina/Ballerina.toml
          sed -i "s/icp.runtime.bridge-native-.*.jar/icp.runtime.bridge-native-$NEXT_VERSION.jar/" ballerina/Ballerina.toml
          git add gradle.properties ballerina/Ballerina.toml
          if ! git diff --cached --quiet; then
            git commit -m "[Release] Prepare for next development iteration $NEXT_VERSION"
          else
            echo "::notice::No changes to commit for next development version"
          fi
      
      - name: Push next dev version to release branch
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: git push origin "release/v${RELEASE_VERSION}"
      
      - name: Create Pull Request
        if: ${{ github.event.inputs.dry-run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "release/v${RELEASE_VERSION}" \
            --title "[Release] v${RELEASE_VERSION}" \
            --body "Automated release PR for version ${RELEASE_VERSION}.
          
          **Changes included:**
          - Bump to release version ${RELEASE_VERSION}
          - Build and publish artifacts
          - Bump to next development version ${NEXT_VERSION}
          
          **Package Details:**
          - Organization: wso2
          - Package: icp.runtime.bridge
          - Version: ${RELEASE_VERSION}"
