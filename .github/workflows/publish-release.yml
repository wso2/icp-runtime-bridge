name: Publish Release

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
      next-version:
        description: 'Next development version (e.g., 0.1.1-SNAPSHOT)'
        required: true
      publish-to-central:
        description: 'Publish to Ballerina Central'
        required: false
        type: boolean
        default: false
      dry-run:
        description: 'Dry run mode (skips publish, release creation, and push)'
        required: false
        type: boolean
        default: false

jobs:
  publish-release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      packageUser: ${{ github.actor }}
      packagePAT: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_DEFAULT_PLATFORM: linux/amd64
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Set up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.0
        with:
          version: 2201.13.2
      
      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Dry Run Mode Notice
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: |
          echo "::notice::Running in DRY RUN mode - no packages will be published, no releases created, and no changes will be pushed"
      
      - name: Update version to release version
        run: |
          sed -i 's/version=.*/version=${{ github.event.inputs.release-version }}/' gradle.properties
          sed -i 's/version = ".*/version = "${{ github.event.inputs.release-version }}"/' ballerina/Ballerina.toml
          sed -i 's/icp.runtime.bridge-native-.*.jar/icp.runtime.bridge-native-${{ github.event.inputs.release-version }}.jar/' ballerina/Ballerina.toml
          git add gradle.properties ballerina/Ballerina.toml
          git commit -m "[Release] Release version ${{ github.event.inputs.release-version }}"
      
      - name: Build (Dry Run)
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: ./gradlew clean build --stacktrace --no-daemon
      
      - name: Build and Publish to GitHub Packages
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: ./gradlew clean build publish --stacktrace --no-daemon
      
      - name: Publish to Ballerina Central
        if: ${{ github.event.inputs.dry-run != 'true' && github.event.inputs.publish-to-central == 'true' }}
        env:
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_ACCESS_TOKEN }}
        run: |
          cd ballerina
          bal pack
          bal push
      
      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry-run != 'true' }}
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: v${{ github.event.inputs.release-version }}
          name: Release v${{ github.event.inputs.release-version }}
          body: |
            Release of icp-runtime-bridge version ${{ github.event.inputs.release-version }}
            
            **Package Details:**
            - Organization: wso2
            - Package: icp.runtime.bridge
            - Version: ${{ github.event.inputs.release-version }}
          files: |
            ballerina/build/distributions/*.zip
            ballerina/build/libs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update version to next development version
        run: |
          sed -i 's/version=.*/version=${{ github.event.inputs.next-version }}/' gradle.properties
          git add gradle.properties
          git commit -m "[Release] Prepare for next development iteration ${{ github.event.inputs.next-version }}"
      
      - name: Push changes
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: git push origin main
